<html>
    <head>
        <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <form >
            full name: <input type="text" name="name"><br>
            email: <input type="email" name="email"><br>
            age: <input type="number" name="age"><br>
<!--            password: <input type="password" name="pass">-->
            Date of Birth: <input type="date" name="dob"><br>
            entry year <input type="date" name="year"><br>
            stream:-<br>
            <input type="checkbox" name="stream" value="Natural">Natural science<br>
            <input type="checkbox" name="stream" value="Social">Social science <br>
            <button type="button" onclick="handleRegister()" >register</button>
            <button type="button" onclick="handleUpdate()" >update</button>
            <button type="button" onclick="handleSearch()" >search</button>
            <button type="button" onclick="handleDelete()" >delete</button>
            <p class="message" ></p>
        </form>
        <script>
            
            const message = document.querySelector('.message');

            function getformdata() {
                const name = document.querySelector('input[name="name"]').value;
                const email = document.querySelector('input[name="email"]').value;
                const age = document.querySelector('input[name="age"]').value;
                const dob = document.querySelector('input[name="dob"]').value;
                const year = document.querySelector('input[name="year"]').value;

                // get checked stream
                const streams = document.querySelectorAll('input[name="stream"]:checked');
                let stream = "";
                streams.forEach(s => stream += s.value + " ");

                return { name, email, age, dob, year, stream };
            }
            
            
            async function handleRegister(){
                try{
                    const formData=getformdata();
                    const res = await fetch('http://localhost:8080/Student_registration_system/read_form_data',{
                        method: 'POST',
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(formData)
                     });
                    const data = await res.json();
                    message.textContent = data.message;
                }catch(err){
//                    message.textContent = data.message;
                    console.log(err);
                }
            }
            async function handleUpdate(){
                try{
                    const formData=getformdata();
                    const res = await fetch('http://localhost:8080/Student_registration_system/read_form_data',{
                        method: 'PUT',
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(formData)
                     });
                    const data = await res.json();
                    message.textContent = data.message;
                }catch(err){
//                    message.textContent = data.message;
                    console.log(err);
                }
            }
            async function handleSearch(){
                try{
                    const res = await fetch('http://localhost:8080/Student_registration_system/read_form_data',{
                        method: 'GET'
                    });
                    const data = await res.json();
                    message.textContent = data.message;
                }catch(err){
//                    message.textContent = data.message;
                    console.log(err);
                }
            }
            async function handleDelete(){
                try{
                    const email = document.querySelector('input[name="email"]').value;
                    const res = await fetch('http://localhost:8080/Student_registration_system/read_form_data',{
                        method: 'DELETE',
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ email })
                     });
                    const data = await res.json();
                    message.textContent = data.message;
                }catch(err){
//                    message.textContent = data.message;
                    console.log(err);
                }
            }
        </script>
    </body>
</html>
